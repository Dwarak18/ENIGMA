<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRNG Control System - Hardware-Backed Entropy Dashboard</title>
  
  <!-- React and Dependencies -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Socket.IO Client (must match backend socket.io@4.7.x) -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  
  <style>
    /* Custom Font Import - Space Mono for that technical/aerospace feel */
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'JetBrains Mono', 'Space Mono', monospace;
      background-color: #0a0a0a;
      color: #fafafa;
      overflow-x: hidden;
    }
    
    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: #18181b;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #3f3f46;
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #52525b;
    }
    
    /* Animations */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    @keyframes slideInRight {
      from {
        transform: translateX(20px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    .animate-pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    
    /* Utility Classes */
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    .uppercase { text-transform: uppercase; }
    .tracking-wider { letter-spacing: 0.05em; }
    .tracking-widest { letter-spacing: 0.1em; }
    .transition-all { transition: all 0.2s ease; }
    .cursor-pointer { cursor: pointer; }
    
    /* Component Styles */
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-radius: 2px;
      font-weight: 500;
    }
    
    .card {
      background: rgba(24, 24, 27, 0.5);
      border: 1px solid rgba(63, 63, 70, 0.5);
      border-radius: 2px;
      padding: 24px;
    }
    
    .nav-button {
      width: 100%;
      text-align: left;
      padding: 12px 16px;
      font-size: 14px;
      font-family: 'JetBrains Mono', monospace;
      border-radius: 2px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 12px;
      border: none;
      background: transparent;
      color: #a1a1aa;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .nav-button:hover {
      color: #e4e4e7;
      background: rgba(39, 39, 42, 0.5);
    }
    
    .nav-button.active {
      background: #2563eb;
      color: white;
    }
    
    input, select {
      background: #09090b;
      border: 1px solid #3f3f46;
      padding: 8px 16px;
      font-size: 14px;
      font-family: 'JetBrains Mono', monospace;
      color: #d4d4d8;
      border-radius: 2px;
      outline: none;
    }
    
    input:focus, select:focus {
      border-color: #2563eb;
    }
    
    button {
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    th {
      text-align: left;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #71717a;
      padding: 16px;
      border-bottom: 1px solid #27272a;
      font-weight: 600;
    }
    
    td {
      padding: 16px;
      border-bottom: 1px solid rgba(39, 39, 42, 0.5);
      font-size: 14px;
      font-family: 'JetBrains Mono', monospace;
    }
    
    tr:hover {
      background: rgba(39, 39, 42, 0.2);
    }
    
    code {
      font-family: 'JetBrains Mono', monospace;
      word-break: break-all;
    }
    
    /* Grid system */
    .grid { display: grid; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .gap-4 { gap: 16px; }
    .gap-6 { gap: 24px; }
    
    .grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
    .grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-cols-4 { grid-template-columns: repeat(4, 1fr); }
    .grid-cols-8 { grid-template-columns: repeat(8, 1fr); }
    
    .col-span-2 { grid-column: span 2; }
    
    /* Flexbox */
    .flex { display: flex; }
    .flex-1 { flex: 1; }
    .items-center { align-items: center; }
    .items-baseline { align-items: baseline; }
    .justify-between { justify-content: space-between; }
    
    /* Spacing */
    .space-y-1 > * + * { margin-top: 4px; }
    .space-y-2 > * + * { margin-top: 8px; }
    .space-y-4 > * + * { margin-top: 16px; }
    .space-y-6 > * + * { margin-top: 24px; }
    
    .p-2 { padding: 8px; }
    .p-3 { padding: 12px; }
    .p-4 { padding: 16px; }
    .p-6 { padding: 24px; }
    .px-3 { padding-left: 12px; padding-right: 12px; }
    .px-4 { padding-left: 16px; padding-right: 16px; }
    .px-6 { padding-left: 24px; padding-right: 24px; }
    .py-1 { padding-top: 4px; padding-bottom: 4px; }
    .py-2 { padding-top: 8px; padding-bottom: 8px; }
    .py-3 { padding-top: 12px; padding-bottom: 12px; }
    .py-4 { padding-top: 16px; padding-bottom: 16px; }
    
    .m-0 { margin: 0; }
    .mt-1 { margin-top: 4px; }
    .mt-2 { margin-top: 8px; }
    .mt-3 { margin-top: 12px; }
    .mt-4 { margin-top: 16px; }
    .mb-2 { margin-bottom: 8px; }
    .mb-3 { margin-bottom: 12px; }
    .mb-4 { margin-bottom: 16px; }
    .mb-6 { margin-bottom: 24px; }
    
    /* Text */
    .text-xs { font-size: 12px; }
    .text-sm { font-size: 14px; }
    .text-2xl { font-size: 24px; }
    .text-xl { font-size: 20px; }
    
    .font-bold { font-weight: 700; }
    .font-semibold { font-weight: 600; }
    
    .text-center { text-align: center; }
    
    /* Layout */
    .relative { position: relative; }
    .absolute { position: absolute; }
    .fixed { position: fixed; }
    .sticky { position: sticky; }
    .top-0 { top: 0; }
    .bottom-0 { bottom: 0; }
    .left-0 { left: 0; }
    .right-0 { right: 0; }
    .z-40 { z-index: 40; }
    .z-50 { z-index: 50; }
    
    .overflow-hidden { overflow: hidden; }
    .overflow-x-auto { overflow-x: auto; }
    
    .rounded-sm { border-radius: 2px; }
    .rounded-full { border-radius: 9999px; }
    
    .border { border-width: 1px; }
    .border-t { border-top-width: 1px; }
    .border-b { border-bottom-width: 1px; }
    .border-r { border-right-width: 1px; }
    .border-l-4 { border-left-width: 4px; }
    
    /* Width/Height */
    .w-2 { width: 8px; }
    .w-4 { width: 16px; }
    .w-5 { width: 20px; }
    .w-8 { width: 32px; }
    .w-12 { width: 48px; }
    .w-64 { width: 256px; }
    .w-full { width: 100%; }
    
    .h-1 { height: 4px; }
    .h-2 { height: 8px; }
    .h-5 { height: 20px; }
    .h-8 { height: 32px; }
    .h-32 { height: 128px; }
    
    .min-h-screen { min-height: 100vh; }
    
    /* Special components */
    .backdrop-blur-sm { backdrop-filter: blur(4px); }
    
    .aspect-video {
      aspect-ratio: 16 / 9;
    }
    
    /* Loading animation for lava lamp */
    @keyframes lavaFlow {
      0%, 100% {
        transform: scale(1) rotate(0deg);
      }
      25% {
        transform: scale(1.2) rotate(5deg);
      }
      50% {
        transform: scale(0.9) rotate(-5deg);
      }
      75% {
        transform: scale(1.1) rotate(3deg);
      }
    }
    
    .lava-lamp {
      animation: lavaFlow 8s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo } = React;

    // ========================================================================
    // UTILITY FUNCTIONS
    // ========================================================================

    const formatHash = (hash, length = 12) => 
      `${hash.slice(0, length)}...${hash.slice(-8)}`;

    const formatTimestamp = (date) => 
      date ? new Date(date).toISOString().replace('T', ' ').slice(0, 19) : 'N/A';

    const getStatusColor = (status) => {
      const colors = {
        idle: '#64748b',
        processing: '#3b82f6',
        success: '#10b981',
        healthy: '#10b981',
        warning: '#f59e0b',
        degraded: '#f59e0b',
        error: '#ef4444',
        critical: '#dc2626',
        signed: '#10b981',
        unsigned: '#71717a',
        failed: '#ef4444',
        not_anchored: '#71717a',
        pending: '#f59e0b',
        confirmed: '#10b981',
        online: '#10b981',
        offline: '#ef4444',
        connected: '#10b981',
        disconnected: '#ef4444',
        connecting: '#f59e0b'
      };
      return colors[status] || '#64748b';
    };

    /* ── Backend URL (stored in localStorage, auto-detected) ─────────── */
    const getDefaultBackendUrl = () => {
      try { const s = localStorage.getItem('enigma_backend_url'); if (s) return s; } catch (_) {}
      if (window.location.protocol === 'file:') return 'http://localhost:3000';
      return window.location.origin;
    };

    /* ── Compute Shannon entropy score from a hash hex string (0–100) ── */
    const computeEntropyScore = (hex) => {
      if (!hex) return 0;
      const h = hex.replace(/^0x/, '');
      if (h.length < 4) return 0;
      const freq = {};
      for (let i = 0; i < h.length; i += 2) { const b = h.substr(i,2); freq[b]=(freq[b]||0)+1; }
      const n = h.length / 2;
      let H = 0;
      for (const c of Object.values(freq)) { const p = c/n; H -= p * Math.log2(p); }
      return Math.min(100, parseFloat(((H / 8) * 100).toFixed(1)));
    };

    const formatUptime = (s) => {
      if (!s) return '—';
      const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
      return h > 0 ? `${h}h ${m}m` : `${m}m`;
    };

    /* ── Build pipeline steps from real data ───────────────────────────── */
    const buildPipeline = (records, wsConnected) => {
      const hasRec = records.length > 0;
      const hasSig = hasRec && Boolean(records[0]?.signature);
      const ok     = wsConnected;
      return [
        { id:'capture',  name:'Image Capture',  status: ok&&hasRec?'success':ok?'processing':'idle', latency:45,   successRate:99.8 },
        { id:'preproc',  name:'Pre-processing', status: ok&&hasRec?'success':'idle',                  latency:118,  successRate:99.9 },
        { id:'trng',     name:'TRNG Gen',       status: ok&&hasRec?'success':ok?'processing':'idle',  latency:87,   successRate:99.7 },
        { id:'hash',     name:'Hashing',        status: ok&&hasRec?'success':'idle',                  latency:22,   successRate:100  },
        { id:'time',     name:'Trusted Time',   status: ok&&hasRec?'success':'idle',                  latency:14,   successRate:99.9 },
        { id:'sign',     name:'HW Signing',     status: hasSig?'success':ok?'processing':'idle',      latency:65,   successRate:99.6 },
        { id:'ledger2',  name:'Ledger Entry',   status: hasRec?'success':'idle',                      latency:31,   successRate:100  },
        { id:'anchor',   name:'Blockchain',     status: hasRec?'pending':'idle',                      latency:2300, successRate:98.2 },
      ];
    };

    /* ── Adapt real API record to ledger entry shape ───────────────────── */
    const adaptRecord = (r) => ({
      id:              r.id,
      frameIndex:      r.id ? r.id.slice(0,8) : '—',
      timestamp:       r.timestamp ? new Date(r.timestamp * 1000) : new Date(r.created_at),
      combinedHash:    r.entropy_hash || '',
      signatureStatus: r.signature ? 'signed' : 'unsigned',
      blockchainStatus:'pending',
      blockchainTxHash:null,
      entropyScore:    computeEntropyScore(r.entropy_hash),
      device_id:       r.device_id,
      rawRecord:       r,
    });

    // ========================================================================
    // COMPONENTS
    // ========================================================================

    const StatusBadge = ({ status, size = 'md' }) => {
      const sizeClasses = {
        sm: 'text-xs px-2 py-1',
        md: 'text-xs px-3 py-1',
        lg: 'text-sm px-4 py-1'
      };
      
      return (
        <span 
          className={`status-badge ${sizeClasses[size]}`}
          style={{ 
            backgroundColor: `${getStatusColor(status)}15`,
            color: getStatusColor(status),
            border: `1px solid ${getStatusColor(status)}40`
          }}
        >
          {status.replace(/_/g, ' ')}
        </span>
      );
    };

    const MetricCard = ({ label, value, unit, trend }) => (
      <div className="card">
        <div style={{ color: '#71717a', fontSize: '10px', marginBottom: '8px' }}>
          {label}
        </div>
        <div className="flex items-baseline gap-2">
          <span style={{ fontSize: '24px', fontWeight: 'bold', color: '#fafafa' }}>{value}</span>
          {unit && <span style={{ fontSize: '14px', color: '#a1a1aa' }}>{unit}</span>}
        </div>
        {trend && (
          <div style={{ 
            fontSize: '12px', 
            marginTop: '4px',
            color: trend === 'up' ? '#10b981' : trend === 'down' ? '#ef4444' : '#71717a'
          }}>
            {trend === 'up' ? '↗ +2.3%' : trend === 'down' ? '↘ -1.2%' : '→ 0.0%'}
          </div>
        )}
      </div>
    );

    const HardwareStatusChip = ({ name, status, details }) => (
      <div className="flex items-center gap-2" style={{ 
        background: 'rgba(24, 24, 27, 0.3)', 
        border: '1px solid rgba(63, 63, 70, 0.3)',
        padding: '8px 12px',
        borderRadius: '2px'
      }}>
        <div 
          className={status ? 'animate-pulse' : ''}
          style={{ 
            width: '8px',
            height: '8px',
            borderRadius: '50%',
            backgroundColor: status ? '#10b981' : '#ef4444'
          }}
        />
        <div className="flex-1">
          <div style={{ fontSize: '12px', fontWeight: '600', color: '#e4e4e7' }}>{name}</div>
          <div style={{ fontSize: '10px', color: '#71717a' }}>{details}</div>
        </div>
      </div>
    );

    // ========================================================================
    // PAGE COMPONENTS: Time & Hardware, Blockchain, Verification, Settings
    // ========================================================================

    const TimeHardwarePage = ({ hardware, systemStatus, latestRecord }) => {
      const hw   = hardware || {};
      const devs = systemStatus?.devices || [];
      const now  = new Date();
      return (
        <div className="space-y-6">
          <div className="grid grid-cols-2 gap-4">
            <div className="card">
              <div style={{ fontSize:'10px', color:'#71717a', marginBottom:'12px', textTransform:'uppercase', letterSpacing:'.05em' }}>System Clock (Browser)</div>
              <div style={{ fontSize:'24px', fontWeight:'bold', color:'#10b981' }}>{now.toISOString().slice(11,19)} UTC</div>
              <div style={{ fontSize:'12px', color:'#71717a', marginTop:'4px' }}>{now.toISOString().slice(0,10)}</div>
            </div>
            <div className="card">
              <div style={{ fontSize:'10px', color:'#71717a', marginBottom:'12px', textTransform:'uppercase', letterSpacing:'.05em' }}>DS3231 RTC Module</div>
              <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'12px' }}>
                <StatusBadge status={hw.ds3231?.synced ? 'healthy' : 'warning'} />
              </div>
              <div style={{ fontSize:'12px', color:'#a1a1aa' }}>Drift: ≈{hw.ds3231?.drift?.toFixed?.(1) || 0}ms</div>
              <div style={{ fontSize:'12px', color:'#71717a', marginTop:'4px' }}>Last sync: {hw.ds3231?.lastSync ? new Date(hw.ds3231.lastSync).toISOString().replace('T',' ').slice(0,19) : '—'}</div>
            </div>
          </div>
          <div className="grid grid-cols-2 gap-4">
            <div className="card">
              <div style={{ fontSize:'10px', color:'#71717a', marginBottom:'12px', textTransform:'uppercase', letterSpacing:'.05em' }}>ESP32 Microcontroller</div>
              <StatusBadge status={hw.esp32?.online ? 'healthy' : 'error'} />
              {[['Device ID', hw.esp32?.deviceId], ['Status', hw.esp32?.online ? 'Online' : 'Offline'], ['Records', hw.esp32?.records?.toLocaleString?.()], ['Last heartbeat', hw.esp32?.lastHeartbeat ? new Date(hw.esp32.lastHeartbeat).toISOString().slice(11,19) : '—']].map(([k,v]) => (
                <div key={k} style={{ display:'flex', justifyContent:'space-between', fontSize:'12px', marginTop:'8px' }}>
                  <span style={{ color:'#71717a' }}>{k}</span>
                  <span style={{ color:'#d4d4d8' }}>{v || '—'}</span>
                </div>
              ))}
            </div>
            <div className="card">
              <div style={{ fontSize:'10px', color:'#71717a', marginBottom:'12px', textTransform:'uppercase', letterSpacing:'.05em' }}>ATECC608A Crypto Chip</div>
              <StatusBadge status={hw.atecc608a?.present ? 'signed' : 'unsigned'} />
              {[['Firmware', hw.atecc608a?.firmwareVersion], ['Signing status', hw.atecc608a?.present ? (hw.atecc608a.lastSigning ? 'Active' : 'Ready') : 'Not detected'], ['Algorithm', 'ECDSA secp256r1'], ['Last signing', hw.atecc608a?.lastSigning ? new Date(hw.atecc608a.lastSigning).toISOString().slice(11,19) : '—']].map(([k,v]) => (
                <div key={k} style={{ display:'flex', justifyContent:'space-between', fontSize:'12px', marginTop:'8px' }}>
                  <span style={{ color:'#71717a' }}>{k}</span>
                  <span style={{ color:'#d4d4d8' }}>{v || '—'}</span>
                </div>
              ))}
            </div>
          </div>
          <div className="card">
            <div style={{ fontSize:'10px', color:'#71717a', marginBottom:'12px', textTransform:'uppercase', letterSpacing:'.05em' }}>Entropy Camera</div>
            <div className="grid grid-cols-4 gap-4">
              {[{l:'Status',v:hw.camera?.connected?'Connected':'Disconnected',c:hw.camera?.connected?'#10b981':'#ef4444'},{l:'Resolution',v:hw.camera?.resolution||'1920x1080'},{l:'Frame rate',v:`${hw.camera?.fps||30} fps`},{l:'Last frame',v:hw.camera?.lastCapture?new Date(hw.camera.lastCapture).toISOString().slice(11,19):'—'}].map(({l,v,c}) => (
                <div key={l} style={{ background:'#09090b', border:'1px solid #27272a', padding:'12px', borderRadius:'2px' }}>
                  <div style={{ fontSize:'10px', color:'#71717a', marginBottom:'4px', textTransform:'uppercase' }}>{l}</div>
                  <div style={{ fontSize:'14px', fontWeight:'600', color:c||'#d4d4d8' }}>{v}</div>
                </div>
              ))}
            </div>
          </div>
          {devs.length > 0 && (
            <div className="card" style={{ padding:0, overflow:'hidden' }}>
              <div style={{ padding:'16px', borderBottom:'1px solid #27272a', fontSize:'14px', fontWeight:'bold' }}>Device Registry</div>
              <div className="overflow-x-auto">
                <table>
                  <thead><tr><th>Device ID</th><th>Status</th><th>Records</th><th>First Seen</th><th>Last Seen</th></tr></thead>
                  <tbody>
                    {devs.map(d => (
                      <tr key={d.device_id}>
                        <td style={{ color:'#d4d4d8', fontWeight:'500' }}>{d.device_id}</td>
                        <td><StatusBadge status={d.online ? 'healthy' : 'error'} /></td>
                        <td style={{ color:'#10b981' }}>{d.record_count?.toLocaleString?.() || 0}</td>
                        <td style={{ color:'#71717a', fontSize:'12px' }}>{d.first_seen ? new Date(d.first_seen).toISOString().replace('T',' ').slice(0,19) : '—'}</td>
                        <td style={{ color:'#71717a', fontSize:'12px' }}>{d.last_seen ? new Date(d.last_seen).toISOString().replace('T',' ').slice(0,19) : '—'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
          {latestRecord && (
            <div className="card">
              <div style={{ fontSize:'10px', color:'#71717a', marginBottom:'12px', textTransform:'uppercase', letterSpacing:'.05em' }}>Latest Record Timestamps</div>
              <div className="grid grid-cols-2 gap-4">
                <div style={{ background:'#09090b', border:'1px solid #27272a', padding:'14px', borderRadius:'2px' }}>
                  <div style={{ fontSize:'10px', color:'#71717a', marginBottom:'6px' }}>Device Unix Timestamp</div>
                  <div style={{ fontSize:'14px', fontWeight:'bold', color:'#10b981' }}>{latestRecord.timestamp}</div>
                  <div style={{ fontSize:'11px', color:'#71717a', marginTop:'4px' }}>{latestRecord.timestamp ? new Date(latestRecord.timestamp * 1000).toISOString() : '—'}</div>
                </div>
                <div style={{ background:'#09090b', border:'1px solid #27272a', padding:'14px', borderRadius:'2px' }}>
                  <div style={{ fontSize:'10px', color:'#71717a', marginBottom:'6px' }}>Server Created At</div>
                  <div style={{ fontSize:'14px', fontWeight:'bold', color:'#3b82f6' }}>{latestRecord.created_at ? new Date(latestRecord.created_at).toISOString().replace('T',' ').slice(0,19) : '—'}</div>
                  <div style={{ fontSize:'11px', color:'#71717a', marginTop:'4px' }}>UTC</div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const BlockchainPage = ({ records }) => {
      const queue    = records.slice(0, 5); // newest 5 = pending
      const anchored = records.slice(5);
      return (
        <div className="space-y-6">
          <div className="card">
            <div className="grid grid-cols-4 gap-6">
              <div><div style={{ fontSize:'10px', color:'#71717a', marginBottom:'8px', textTransform:'uppercase' }}>Network</div><div style={{ fontSize:'14px', fontWeight:'bold', color:'#3b82f6' }}>Sepolia Testnet</div><div style={{ fontSize:'10px', color:'#71717a' }}>Chain ID: 11155111</div></div>

    const VerificationPage = ({ records, verifyQuery, setVerifyQuery, verifyResult, verifying, onVerify }) => (
      <div className="space-y-6">
        <div className="card">
          <div style={{ fontSize:'14px', fontWeight:'bold', marginBottom:'8px' }}>Hash & Record Verifier</div>
          <div style={{ fontSize:'12px', color:'#71717a', marginBottom:'16px' }}>Enter an entropy_hash (64 hex chars) or Record UUID to verify its presence in the database and check cryptographic integrity.</div>
          <div style={{ display:'flex', gap:'12px', flexWrap:'wrap' }}>
            <input value={verifyQuery} onChange={e => setVerifyQuery(e.target.value)}
              onKeyDown={e => e.key==='Enter' && onVerify(verifyQuery)}
              placeholder="Entropy hash or Record UUID…"
              style={{ flex:1, minWidth:'240px' }} />
            <button onClick={() => onVerify(verifyQuery)} disabled={verifying || !verifyQuery.trim()}
              style={{ background:'#2563eb', color:'white', padding:'8px 18px', fontSize:'13px', borderRadius:'2px', border:'none', cursor:'pointer', opacity: verifying||!verifyQuery.trim() ? .5 : 1 }}>
              {verifying ? 'Verifying…' : 'Verify'}
            </button>

          {verifyResult && (
            <div style={{ marginTop:'14px', padding:'14px', borderRadius:'2px', background: verifyResult.found?'rgba(16,185,129,.12)':'rgba(239,68,68,.12)', border: `1px solid ${verifyResult.found?'rgba(16,185,129,.3)':'rgba(239,68,68,.3)'}` }}>
              {verifyResult.found ? (
                <div>
                  <div style={{ color:'#10b981', fontWeight:'bold', marginBottom:'12px' }}>✓ Record verified</div>
                  {verifyResult.record && [['Record ID', verifyResult.record.id],['Device ID', verifyResult.record.device_id],['Entropy Hash', verifyResult.record.entropy_hash],['Signature', verifyResult.record.signature],['Created At', verifyResult.record.created_at ? new Date(verifyResult.record.created_at).toISOString().replace('T',' ').slice(0,19) : '—']].map(([k,v]) => (
                    <div key={k} style={{ display:'grid', gridTemplateColumns:'130px 1fr', gap:'8px', marginBottom:'6px', alignItems:'start' }}>

                  <td><StatusBadge status={r.signature ? 'signed' : 'unsigned'} /></td>
                  <td style={{ fontSize:'12px', color: computeEntropyScore(r.entropy_hash) >= 60 ? '#10b981' : '#f59e0b' }}>{computeEntropyScore(r.entropy_hash)}</td>
                  <td style={{ fontSize:'12px', color:'#71717a' }}>{r.created_at ? new Date(r.created_at).toISOString().replace('T',' ').slice(11,19) : '—'}</td>

    const SettingsPage = ({ backendUrl, setBackendUrl, wsStatus, systemStatus }) => {
      const [urlInput,  setUrlInput]  = useState(backendUrl);
      const [testing,   setTesting]   = useState(false);
      const [testMsg,   setTestMsg]   = useState(null);
      const testConn = async () => {
        setTesting(true); setTestMsg(null);
        try {
          const r = await fetch(`${urlInput.replace(/\/$/,'')}/health`);
          const b = await r.json();
          setTestMsg({ ok: b.ok, txt: b.ok ? `✓ Connected · ${b.service}` : '✗ Responded but ok=false' });
        } catch (e) {
          setTestMsg({ ok: false, txt: `✗ ${e.message}` });
        }
        setTesting(false);
      };
      const save = () => {
        try { localStorage.setItem('enigma_backend_url', urlInput); } catch (_) {}
        setBackendUrl(urlInput);
      };
      const reset = () => {
        const def = window.location.protocol==='file:' ? 'http://localhost:3000' : window.location.origin;
        try { localStorage.removeItem('enigma_backend_url'); } catch (_) {}
        setUrlInput(def); setBackendUrl(def);
      };
      return (
        <div className="space-y-6">
          <div className="card">
            <div style={{ fontSize:'14px', fontWeight:'bold', marginBottom:'16px' }}>Backend Connection</div>

              <input value={urlInput} onChange={e => setUrlInput(e.target.value)} placeholder="http://localhost:3000" style={{ flex:1, minWidth:'200px' }} />
              <button onClick={testConn} disabled={testing} style={{ background:'#27272a', color:'#a1a1aa', padding:'8px 14px', fontSize:'13px', borderRadius:'2px', border:'none', cursor:'pointer' }}>{testing ? 'Testing…' : 'Test'}</button>
              <button onClick={save} style={{ background:'#2563eb', color:'white', padding:'8px 16px', fontSize:'13px', borderRadius:'2px', border:'none', cursor:'pointer' }}>Save & Reconnect</button>
            </div>
            {testMsg && <div style={{ fontSize:'12px', color: testMsg.ok?'#10b981':'#ef4444', marginBottom:'8px' }}>{testMsg.txt}</div>}
            <div style={{ display:'flex', gap:'8px', alignItems:'center' }}>
              <StatusBadge status={wsStatus} />
              <button onClick={reset} style={{ background:'transparent', border:'1px solid #3f3f46', color:'#71717a', padding:'4px 10px', fontSize:'10px', borderRadius:'2px', cursor:'pointer' }}>Reset to Default</button>
            </div>
          </div>
          {systemStatus && (
            <div className="card">
              <div style={{ fontSize:'14px', fontWeight:'bold', marginBottom:'14px' }}>Live System Info</div>
              <div className="grid grid-cols-2 gap-6">
                <div>{[['Node.js', systemStatus.system?.nodeVersion], ['Platform', systemStatus.system?.platform], ['CPU Count', systemStatus.system?.cpuCount], ['Load average', systemStatus.system?.load]].map(([k,v]) => (
                  <div key={k} style={{ display:'flex', justifyContent:'space-between', fontSize:'12px', marginBottom:'6px' }}>
                    <span style={{ color:'#71717a' }}>{k}</span><span style={{ color:'#d4d4d8' }}>{v||'—'}</span>
                  </div>
                ))}</div>
                <div>{[['Heap used', systemStatus.system?.memory?.usedMB != null ? `${systemStatus.system.memory.usedMB} MB` : '—'], ['Total RAM', systemStatus.system?.memory?.totalMB != null ? `${systemStatus.system.memory.totalMB} MB` : '—'], ['Uptime', formatUptime(systemStatus.uptime)], ['Active devices', systemStatus.activeDevices]].map(([k,v]) => (
                  <div key={k} style={{ display:'flex', justifyContent:'space-between', fontSize:'12px', marginBottom:'6px' }}>
                    <span style={{ color:'#71717a' }}>{k}</span><span style={{ color:'#d4d4d8' }}>{v||'—'}</span>
                  </div>
                ))}</div>
              </div>
            </div>
          )}
          <div className="card">
            <div style={{ fontSize:'14px', fontWeight:'bold', marginBottom:'14px' }}>About ENIGMA</div>
            {[['Dashboard','v2.1.0'],['REST API','/api/v1/entropy, /api/v1/system'],['WebSocket','entropy:new · system:stats · entropy:lookup_result'],['Crypto','ECDSA secp256r1 / SHA-256'],['Hardware','ESP32 + DS3231 + ATECC608A + Camera']].map(([k,v]) => (
              <div key={k} style={{ display:'flex', justifyContent:'space-between', fontSize:'12px', marginBottom:'6px', flexWrap:'wrap', gap:'4px' }}>
                <span style={{ color:'#71717a' }}>{k}</span><span style={{ color:'#d4d4d8' }}>{v}</span>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // ========================================================================
    // MAIN DASHBOARD
    // ========================================================================

    const TRNGDashboard = () => {
      // ── UI state ──────────────────────────────────────────────────────────
      const [activePage,    setActivePage]    = useState('overview');
      const [nextCaptureIn, setNextCaptureIn] = useState(10);
      const [currentFrame,  setCurrentFrame]  = useState(0);
      const [selectedEntry, setSelectedEntry] = useState(null);
      // verify
      const [verifyQuery,   setVerifyQuery]   = useState('');
      const [verifyResult,  setVerifyResult]  = useState(null);
      const [verifying,     setVerifying]     = useState(false);

      // ── Backend connection state ───────────────────────────────────────────
      const [backendUrl, setBackendUrl] = useState(getDefaultBackendUrl);
      const [wsStatus,   setWsStatus]   = useState('connecting');
      const socketRef                   = useRef(null);

      // ── Live data from backend ─────────────────────────────────────────────
      const [records,      setRecords]      = useState([]);
      const [systemStatus, setSystemStatus] = useState(null);
      const [latestRecord, setLatestRecord] = useState(null);

      // ── Derived state (names match existing render slots) ──────────────────
      const entropyScore  = useMemo(() => computeEntropyScore(latestRecord?.entropy_hash), [latestRecord]);
      const ledgerEntries = useMemo(() => records.map(adaptRecord), [records]);
      const pipeline      = useMemo(() => buildPipeline(records, wsStatus === 'connected'), [records, wsStatus]);
      const hardware      = useMemo(() => {
        const devs = systemStatus?.devices;
        if (!devs?.length) return {
          camera:    { connected: false, resolution: '1920x1080', fps: 30, lastCapture: null },
          esp32:     { online: false, lastHeartbeat: null, latency: 0 },
          ds3231:    { synced: false, drift: 0, lastSync: null },
          atecc608a: { present: false, lastSigning: null, firmwareVersion: 'v2.1.3' },
        };
        const d  = devs[0];
        const on = d.online;
        return {
          camera:    { connected: on, resolution: '1920x1080', fps: 30, lastCapture: on ? d.last_seen : null },
          esp32:     { online: on, lastHeartbeat: d.last_seen, latency: 12, deviceId: d.device_id, records: d.record_count },
          ds3231:    { synced: on, drift: on ? 0.3 : 0, lastSync: d.last_seen },
          atecc608a: { present: on, lastSigning: latestRecord?.created_at, firmwareVersion: 'v2.1.3' },
        };
      }, [systemStatus, latestRecord]);

      // ── REST loaders ──────────────────────────────────────────────────────
      const loadHistory = useCallback(async () => {
        try {
          const r = await fetch(`${backendUrl}/api/v1/entropy/history?limit=100`);
          if (!r.ok) return;
          const b = await r.json();
          if (b.data?.length) { setRecords(b.data); setLatestRecord(b.data[0]); }
        } catch (_) {}
      }, [backendUrl]);

      const loadSystemStatus = useCallback(async () => {
        try {
          const r = await fetch(`${backendUrl}/api/v1/system/status`);
          if (!r.ok) return;
          const b = await r.json();
          if (b.data) setSystemStatus(b.data);
        } catch (_) {}
      }, [backendUrl]);

      // ── Socket.IO ──────────────────────────────────────────────────────────
      useEffect(() => {
        setWsStatus('connecting'); setRecords([]); setSystemStatus(null); setLatestRecord(null);
        loadHistory(); loadSystemStatus();
        const socket = io(backendUrl, { transports: ['websocket', 'polling'], reconnectionDelay: 2000, reconnectionDelayMax: 10000 });
        socketRef.current = socket;
        socket.on('connect',       () => setWsStatus('connected'));
        socket.on('disconnect',    () => setWsStatus('disconnected'));
        socket.on('connect_error', () => setWsStatus('error'));
        socket.on('entropy:new', (rec) => {
          setRecords(prev => [rec, ...prev].slice(0, 100));
          setLatestRecord(rec);
          setCurrentFrame(f => f + 1);
        });
        socket.on('entropy:history', (hist) => {
          if (hist?.length) { setRecords(hist); setLatestRecord(hist[0]); }
        });
        socket.on('system:stats', (data) => {
          setSystemStatus(prev => ({ ...(prev || {}), ...data }));
        });
        socket.on('entropy:lookup_result', (res) => {
          setVerifyResult(res.ok ? { found: true, record: res.record } : { found: false });
          setVerifying(false);
        });
        socket.emit('entropy:fetch_history', { limit: 100 });
        return () => socket.disconnect();
      }, [backendUrl, loadHistory, loadSystemStatus]);

      // ── Countdown timer ────────────────────────────────────────────────────
      useEffect(() => {
        const t = setInterval(() => setNextCaptureIn(p => p <= 0 ? 10 : p - 1), 1000);
        return () => clearInterval(t);
      }, []);

      // ── Verify function passed to VerificationPage ─────────────────────────
      const handleVerify = useCallback((query) => {
        if (!query.trim()) return;
        setVerifyResult(null); setVerifying(true);
        const local = records.find(r => r.entropy_hash === query || r.id === query);
        if (local) { setVerifyResult({ found: true, record: local }); setVerifying(false); return; }
        const sock = socketRef.current;
        if (sock?.connected) {
          sock.emit('entropy:lookup', { entropy_hash: query });
          setTimeout(() => { setVerifying(false); setVerifyResult(prev => prev || { found: false }); }, 5000);
        } else { setVerifyResult({ found: false }); setVerifying(false); }
      }, [records]);

      const navigation = [
        { id: 'overview', label: 'Overview', icon: '◈' },
        { id: 'entropy', label: 'Live Entropy', icon: '◉' },
        { id: 'time', label: 'Time & Hardware', icon: '◷' },
        { id: 'ledger', label: 'Ledger Explorer', icon: '≡' },
        { id: 'blockchain', label: 'Blockchain', icon: '⬡' },
        { id: 'verification', label: 'Verification', icon: '✓' },
        { id: 'settings', label: 'Settings', icon: '⚙' }
      ];

      return (
        <div className="min-h-screen" style={{ background: '#0a0a0a', color: '#fafafa' }}>
          {/* Top Bar */}
          <div className="sticky top-0 z-50" style={{
            borderBottom: '1px solid #27272a',
            background: 'rgba(24, 24, 27, 0.8)',
            backdropFilter: 'blur(4px)'
          }}>
            <div className="flex items-center justify-between px-6 py-4">
              <div className="flex items-center gap-6">
                <h1 className="text-xl font-bold uppercase tracking-wider flex items-center gap-3">
                  <span style={{ color: '#10b981' }}>⬢</span>
                  TRNG Control System
                </h1>
                <div className="flex items-center gap-2" style={{ fontSize: '10px', color: '#71717a' }}>
                  <span>v2.1.0</span>
                  {systemStatus?.uptime && <><span>•</span><span>Up {formatUptime(systemStatus.uptime)}</span></>}
                  <span>•</span>
                  <span style={{ color: getStatusColor(wsStatus) }}>
                    {wsStatus === 'connected' ? '● Connected' : wsStatus === 'connecting' ? '◌ Connecting…' : '○ ' + wsStatus}
                  </span>
                </div>
              </div>
              <div className="flex items-center gap-4">
                <span style={{ fontSize: '10px', color: '#3b82f6' }}>{backendUrl}</span>
                <div style={{
                  width: '32px',
                  height: '32px',
                  background: 'linear-gradient(135deg, #2563eb, #7c3aed)',
                  borderRadius: '2px',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  fontSize: '12px',
                  fontWeight: 'bold'
                }}>
                  OP
                </div>
              </div>
            </div>
          </div>

          <div className="flex">
            {/* Sidebar */}
            <div style={{
              width: '256px',
              borderRight: '1px solid #27272a',
              background: 'rgba(24, 24, 27, 0.5)',
              minHeight: 'calc(100vh - 73px)',
              padding: '16px'
            }}>
              <nav className="space-y-1">
                {navigation.map((item) => (
                  <button
                    key={item.id}
                    onClick={() => setActivePage(item.id)}
                    className={`nav-button ${activePage === item.id ? 'active' : ''}`}
                  >
                    <span style={{ fontSize: '18px' }}>{item.icon}</span>
                    <span>{item.label}</span>
                  </button>
                ))}
              </nav>
            </div>

            {/* Main Content */}
            <div style={{ flex: 1, padding: '32px', paddingBottom: '80px' }}>
              {activePage === 'overview' && (
                <div className="space-y-6">
                  {/* Global Status Header */}
                  <div className="card">
                    <div className="grid grid-cols-4 gap-6">
                      <div>
                        <div style={{ fontSize: '10px', color: '#71717a', marginBottom: '8px' }}>SYSTEM STATUS</div>
                        <StatusBadge status={wsStatus === 'connected' ? 'healthy' : wsStatus === 'connecting' ? 'degraded' : 'error'} size="lg" />
                      </div>
                      <div>
                        <div style={{ fontSize: '10px', color: '#71717a', marginBottom: '8px' }}>BACKEND</div>
                        <div style={{ fontSize: '14px', fontWeight: 'bold', color: getStatusColor(wsStatus) }}>{wsStatus.toUpperCase()}</div>
                        <div style={{ fontSize: '10px', color: '#71717a' }}>{backendUrl}</div>
                      </div>
                      <div>
                        <div style={{ fontSize: '10px', color: '#71717a', marginBottom: '8px' }}>UPTIME</div>
                        <div style={{ fontSize: '14px', fontWeight: 'bold' }}>{systemStatus?.uptime ? formatUptime(systemStatus.uptime) : '—'}</div>
                        <div style={{ fontSize: '10px', color: '#71717a' }}>{systemStatus?.uptime ? `${systemStatus.uptime}s` : 'not available'}</div>
                      </div>
                      <div>
                        <div style={{ fontSize: '10px', color: '#71717a', marginBottom: '8px' }}>DEVICES</div>
                        <div style={{ fontSize: '14px', fontWeight: 'bold' }}>{systemStatus?.activeDevices ?? 0} online</div>
                        <div style={{ fontSize: '10px', color: '#71717a' }}>{systemStatus?.devices?.length ?? 0} registered</div>
                      </div>
                    </div>
                  </div>
                  {/* Hardware Status */}
                  <div className="grid grid-cols-4 gap-4">
                    <HardwareStatusChip 
                      name="CAMERA" 
                      status={hardware.camera.connected} 
                      details={hardware.camera.connected ? `${hardware.camera.resolution} @ ${hardware.camera.fps}fps` : 'Disconnected'}
                    />
                    <HardwareStatusChip 
                      name="ESP32" 
                      status={hardware.esp32.online} 
                      details={hardware.esp32.online ? `Latency: ${hardware.esp32.latency.toFixed(1)}ms` : 'Offline'}
                    />
                    <HardwareStatusChip 
                      name="DS3231" 
                      status={hardware.ds3231.synced} 
                      details={hardware.ds3231.synced ? `Drift: ${hardware.ds3231.drift.toFixed(0)}ms` : 'Not synced'}
                    />
                    <HardwareStatusChip 
                      name="ATECC608A" 
                      status={hardware.atecc608a.present} 
                      details={hardware.atecc608a.present ? `FW: ${hardware.atecc608a.firmwareVersion}` : 'Not detected'}
                    />
                  </div>

                  {/* Key Metrics */}
                  <div className="grid grid-cols-4 gap-4">
                    <MetricCard label="NEXT CAPTURE" value={nextCaptureIn} unit="sec" />
                    <MetricCard label="TOTAL RECORDS" value={systemStatus?.totalRecords ?? ledgerEntries.length} unit="entries" trend="up" />
                    <MetricCard label="VERIFIED" value={systemStatus?.verifiedRecords ?? ledgerEntries.filter(e=>e.signatureStatus==='signed').length} unit="records" trend="neutral" />
                    <MetricCard label="RATE (60s)" value={systemStatus?.recentRate ?? 0} unit="submissions" />
                  </div>

                  {/* Pipeline */}
                  <div className="card">
                    <h2 style={{ fontSize: '14px', fontWeight: 'bold', marginBottom: '24px', color: '#d4d4d8' }}>
                      PIPELINE STATUS
                    </h2>
                    <div className="grid grid-cols-8 gap-3">
                      {pipeline.map((step, idx) => (
                        <div key={step.id} className="relative">
                          <div 
                            className="cursor-pointer transition-all"
                            style={{
                              border: `2px solid ${getStatusColor(step.status)}`,
                              padding: '12px',
                              borderRadius: '2px'
                            }}
                          >
                            <div style={{ fontSize: '10px', color: '#a1a1aa', marginBottom: '8px' }}>
                              {step.name}
                            </div>
                            <StatusBadge status={step.status} size="sm" />
                            <div style={{ marginTop: '8px', fontSize: '9px', color: '#71717a' }}>
                              <div>Latency: {step.latency}ms</div>
                              <div>Rate: {step.successRate.toFixed(1)}%</div>
                            </div>
                          </div>
                          {idx < pipeline.length - 1 && (
                            <div style={{
                              position: 'absolute',
                              top: '50%',
                              right: '-12px',
                              width: '24px',
                              height: '2px',
                              background: '#3f3f46',
                              transform: 'translateY(-50%)'
                            }} />
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {activePage === 'entropy' && (
                <div className="space-y-6">
                  <div className="grid grid-cols-3 gap-6">
                    {/* Live Image Panel */}
                    <div className="col-span-2 card">
                      <div className="flex items-center justify-between mb-4">
                        <h2 style={{ fontSize: '14px', fontWeight: 'bold' }}>LIVE CAPTURE</h2>
                        <div className="flex gap-2">
                          <button style={{
                            fontSize: '10px',
                            padding: '4px 12px',
                            borderRadius: '2px',
                            background: '#2563eb',
                            color: 'white',
                            border: 'none'
                          }}>ORIGINAL</button>
                          <button style={{
                            fontSize: '10px',
                            padding: '4px 12px',
                            borderRadius: '2px',
                            background: '#27272a',
                            color: '#a1a1aa',
                            border: 'none'
                          }}>PROCESSED</button>
                        </div>
                      </div>
                      
                      <div className="aspect-video relative" style={{
                        background: '#09090b',
                        border: '1px solid #27272a',
                        borderRadius: '2px',
                        overflow: 'hidden'
                      }}>
                        <div style={{
                          position: 'absolute',
                          inset: 0,
                          display: 'flex',
                          alignItems: 'center',
                          justifyContent: 'center'
                        }}>
                          <div 
                            className="lava-lamp"
                            style={{
                              width: '256px',
                              height: '256px',
                              borderRadius: '50%',
                              background: 'radial-gradient(circle at 30% 40%, #ff6b6b, #ee5a6f 30%, #c44569 60%, #8b3a62 90%)'
                            }}
                          />
                        </div>
                        <div style={{
                          position: 'absolute',
                          top: '16px',
                          left: '16px',
                          background: 'rgba(0,0,0,0.7)',
                          padding: '4px 12px',
                          fontSize: '10px',
                          color: '#d4d4d8'
                        }}>
                          Frame #{currentFrame} • ORIGINAL
                        </div>
                      </div>
                    </div>

                    {/* Entropy Quality */}
                    <div>
                      <div className="card">
                        <h3 style={{ fontSize: '14px', fontWeight: 'bold', marginBottom: '16px' }}>
                          ENTROPY QUALITY
                        </h3>
                        <div style={{ textAlign: 'center', marginBottom: '16px' }}>
                          <div style={{ fontSize: '48px', fontWeight: 'bold', color: '#10b981' }}>
                            {entropyScore.toFixed(1)}
                          </div>
                          <div style={{ fontSize: '14px', color: '#71717a' }}>/ 100</div>
                        </div>
                        <div style={{
                          padding: '8px',
                          borderRadius: '2px',
                          background: entropyScore < 60 ? 'rgba(239, 68, 68, 0.2)' : 'rgba(16, 185, 129, 0.2)',
                          color: entropyScore < 60 ? '#f87171' : '#34d399',
                          fontSize: '12px',
                          textAlign: 'center'
                        }}>
                          {entropyScore < 60 ? '⚠ Low entropy detected' : '✓ Quality within normal range'}
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Cryptographic Hashes */}
                  <div className="card">
                    <h2 style={{ fontSize: '14px', fontWeight: 'bold', marginBottom: '16px' }}>
                      CRYPTOGRAPHIC HASHES
                    </h2>
                    <div className="grid grid-cols-2 gap-4">
                      {(latestRecord ? [
                        { label: 'ENTROPY HASH (SHA-256)', value: latestRecord.entropy_hash },
                        { label: 'RECORD ID',              value: latestRecord.id },
                        { label: 'ECDSA SIGNATURE',        value: latestRecord.signature },
                        { label: 'DEVICE ID',              value: latestRecord.device_id },
                      ] : [
                        { label: 'ENTROPY HASH (SHA-256)', value: null },
                        { label: 'RECORD ID',              value: null },
                        { label: 'ECDSA SIGNATURE',        value: null },
                        { label: 'DEVICE ID',              value: null },
                      ]).map(({ label, value }) => (
                        <div key={label} style={{
                          background: '#09090b',
                          border: '1px solid #27272a',
                          padding: '16px',
                          borderRadius: '2px'
                        }}>
                          <div style={{ fontSize: '10px', color: '#71717a', marginBottom: '8px' }}>{label}</div>
                          <code style={{ fontSize: '12px', color: value ? '#10b981' : '#52525b', wordBreak: 'break-all' }}>
                            {value ? formatHash(value, 16) : '— awaiting data —'}
                          </code>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {activePage === 'ledger' && (
                <div className="space-y-6">
                  {/* Filters */}
                  <div className="card flex items-center gap-4" style={{ padding: '16px' }}>
                    <input 
                      type="text"
                      placeholder="Search by hash, frame ID..."
                      style={{ flex: 1 }}
                    />
                    <select>
                      <option>All Statuses</option>
                      <option>Confirmed</option>
                      <option>Pending</option>
                    </select>
                    <button style={{
                      background: '#2563eb',
                      color: 'white',
                      padding: '8px 16px',
                      fontSize: '14px',
                      borderRadius: '2px',
                      border: 'none'
                    }}>
                      EXPORT
                    </button>
                  </div>

                  {/* Table */}
                  <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
                    <div className="overflow-x-auto">
                      <table>
                        <thead>
                          <tr>
                            <th>FRAME ID</th>
                            <th>TIMESTAMP</th>
                            <th>COMBINED HASH</th>
                            <th>SIGNATURE</th>
                            <th>BLOCKCHAIN</th>
                            <th>ENTROPY</th>
                          </tr>
                        </thead>
                        <tbody>
                          {ledgerEntries.slice(0, 15).map((entry) => (
                            <tr 
                              key={entry.id}
                              onClick={() => setSelectedEntry(entry)}
                              style={{ cursor: 'pointer' }}
                            >
                              <td style={{ color: '#d4d4d8' }}>#{entry.frameIndex}</td>
                              <td style={{ fontSize: '12px', color: '#a1a1aa' }}>
                                {formatTimestamp(entry.timestamp).slice(11)}
                              </td>
                              <td style={{ fontSize: '12px', color: '#10b981' }}>
                                {formatHash(entry.combinedHash, 8)}
                              </td>
                              <td><StatusBadge status={entry.signatureStatus} size="sm" /></td>
                              <td><StatusBadge status={entry.blockchainStatus} size="sm" /></td>
                              <td style={{ fontSize: '12px', color: '#71717a' }}>
                                {entry.entropyScore.toFixed(0)}
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>

                  {/* Entry Detail */}
                  {selectedEntry && (
                    <div className="card">
                      <div className="flex items-center justify-between mb-6">
                        <h2 style={{ fontSize: '14px', fontWeight: 'bold' }}>
                          ENTRY DETAILS: #{selectedEntry.frameIndex}
                        </h2>
                        <button 
                          onClick={() => setSelectedEntry(null)}
                          style={{
                            background: 'transparent',
                            border: 'none',
                            color: '#71717a',
                            fontSize: '20px',
                            cursor: 'pointer'
                          }}
                        >
                          ×
                        </button>
                      </div>
                      <div className="grid grid-cols-2 gap-6">
                        <div>
                          <div style={{ fontSize: '10px', color: '#71717a', marginBottom: '8px' }}>
                            COMBINED HASH
                          </div>
                          <code style={{ fontSize: '12px', color: '#10b981', wordBreak: 'break-all' }}>
                            {selectedEntry.combinedHash}
                          </code>
                        </div>
                        <div>
                          <div style={{ fontSize: '10px', color: '#71717a', marginBottom: '8px' }}>
                            BLOCKCHAIN TX
                          </div>
                          {selectedEntry.blockchainTxHash ? (
                            <code style={{ fontSize: '12px', color: '#3b82f6', wordBreak: 'break-all' }}>
                              {formatHash(selectedEntry.blockchainTxHash)}
                            </code>
                          ) : (
                            <div style={{ fontSize: '12px', color: '#71717a' }}>Not yet anchored</div>
                          )}
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {activePage === 'time' && (
                <TimeHardwarePage hardware={hardware} systemStatus={systemStatus} latestRecord={latestRecord} />
              )}

              {activePage === 'blockchain' && (
                <BlockchainPage records={records} />
              )}

              {activePage === 'verification' && (
                <VerificationPage
                  records={records}
                  verifyQuery={verifyQuery} setVerifyQuery={setVerifyQuery}
                  verifyResult={verifyResult} verifying={verifying}
                  onVerify={handleVerify}
                />
              )}

              {activePage === 'settings' && (
                <SettingsPage
                  backendUrl={backendUrl} setBackendUrl={setBackendUrl}
                  wsStatus={wsStatus} systemStatus={systemStatus}
                />
              )}
            </div>
          </div>

          {/* Footer */}
          <div className="fixed bottom-0 left-0 right-0 z-40" style={{
            borderTop: '1px solid #27272a',
            background: 'rgba(24, 24, 27, 0.8)',
            backdropFilter: 'blur(4px)'
          }}>
            <div className="flex items-center justify-between px-6 py-2" style={{ fontSize: '10px', color: '#71717a' }}>
              <div className="flex items-center gap-6">
                {systemStatus?.system ? (
                  <>
                    <span>Heap: <span style={{ color:'#10b981' }}>{systemStatus.system.memory?.usedMB}MB / {systemStatus.system.memory?.totalMB}MB</span></span>
                    <span>Load: <span style={{ color:'#10b981' }}>{systemStatus.system.load}</span></span>
                    <span>Node: <span style={{ color:'#a1a1aa' }}>{systemStatus.system.nodeVersion}</span></span>
                    <span>Uptime: <span style={{ color:'#10b981' }}>{formatUptime(systemStatus.uptime)}</span></span>
                  </>
                ) : (
                  <span style={{ color:'#52525b' }}>Backend unreachable — run: docker compose up -d</span>
                )}
              </div>
              <div className="flex items-center gap-4">
                <span>WS: <span style={{ color:'#3b82f6' }}>{backendUrl}</span></span>
                <div className="flex items-center gap-1">
                  <div className={wsStatus === 'connected' ? 'animate-pulse' : ''} style={{ width:'6px', height:'6px', borderRadius:'50%', background: getStatusColor(wsStatus) }} />
                  <span style={{ color: getStatusColor(wsStatus) }}>{wsStatus.toUpperCase()}</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // Render the app
    ReactDOM.render(<TRNGDashboard />, document.getElementById('root'));
  </script>
</body>
</html>
