# ══════════════════════════════════════════════════════════════════════════
# ENIGMA – Unified Docker Compose Stack
#
# Services:
#   postgres      PostgreSQL 15 (persistent storage)
#   blockchain    Hardhat local node (EVM compatibility)
#   backend       Node.js Express + WebSocket (logic & crypto)
#   frontend      React/Vite served by Nginx (UI)
#   firmware      ESP32-S3 Simulator (logic testing)
#   device-listener Hardware bridge (serial to API)
# ══════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL 15 (Database) ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       enigma_db
      POSTGRES_USER:     enigma
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enigma -d enigma_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - enigma_net

  # ── Blockchain (Hardhat Node) ─────────────────────────────────────────
  blockchain:
    build:
      context: .
      dockerfile: Dockerfile.blockchain
    restart: unless-stopped
    ports:
      - "8545:8545"
    networks:
      - enigma_net

  # ── Backend (Node.js Express) ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL:      postgresql://enigma:changeme@postgres:5432/enigma_db
      RPC_URL:           http://blockchain:8545
      PRIVATE_KEY:       0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      CONTRACT_ADDRESS:  0x5FbDB2315678afecb367f032d93F642f64180aa3
      BLOCKCHAIN_ENABLED: "true"
      PORT: 3000
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      blockchain:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - enigma_net

  # ── Frontend (React + Nginx) ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      VITE_API_URL: http://backend:3000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - enigma_net

  # ── Firmware (ESP32-S3 Simulator) ────────────────────────────────────
  firmware:
    build:
      context: ./firmware
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BACKEND_URL:          http://backend:3000
      DEVICE_ID:            ENIGMA
      ENTROPY_INTERVAL_MS:  "10000"
      HTTP_TIMEOUT_S:       "10"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - enigma_net

  # ── Device Listener (USB/Serial Bridge) ───────────────────────────────
  device-listener:
    build:
      context: ./tools/device_listener
      dockerfile: Dockerfile
    restart: unless-stopped
    privileged: true
    volumes:
      - /dev:/dev
      - /run/udev:/run/udev:ro
    environment:
      BACKEND_URL:           http://backend:3000
      DEVICE_ID:             esp32-001
      BAUD_RATE:             "115200"
      SETTLE_S:              "1.5"
      HANDSHAKE_TIMEOUT_S:   "5"
      SKIP_HANDSHAKE:        "false"
      POLL_S:                "3"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - enigma_net

volumes:
  postgres_data:

networks:
  enigma_net:
    driver: bridge
