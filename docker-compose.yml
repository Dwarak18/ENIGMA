version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
#  ENIGMA – Docker Compose
#
#  Services:
#    db        – PostgreSQL 15
#    backend   – Node.js API + WebSocket
#    frontend  – React SPA (built, served by Nginx)
#    nginx     – Reverse proxy / TLS termination
#
#  Usage:
#    cp backend/.env.example backend/.env   # fill in values
#    docker compose up -d --build
#    docker compose exec backend node src/db/migrate.js
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: enigma_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     enigma
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB:       enigma_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enigma -d enigma_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - enigma_net

  # ── Backend ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: enigma_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      NODE_ENV:     production
      DATABASE_URL: postgresql://enigma:${POSTGRES_PASSWORD:-changeme}@db:5432/enigma_db
      PORT:         3000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - enigma_net
    # Expose only internally – nginx proxies externally
    expose:
      - "3000"

  # ── Frontend ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: enigma_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - enigma_net
    expose:
      - "80"

  # ── Nginx reverse proxy ─────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: enigma_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # TLS certificates (Let's Encrypt / self-signed for dev)
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - enigma_net

volumes:
  postgres_data:

networks:
  enigma_net:
    driver: bridge
