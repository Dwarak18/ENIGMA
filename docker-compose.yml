# ══════════════════════════════════════════════════════════════════════════════
#  ENIGMA – Docker Compose
#
#  Services:
#    db        – PostgreSQL 15
#    backend   – Node.js API + WebSocket
#    frontend  – Builds Vite/React app, serves via nginx, proxies API & WS
#
#  Usage:
#    docker compose up -d --build
#    open http://localhost
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: enigma_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     enigma
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB:       enigma_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enigma -d enigma_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - enigma_net

  # ── Backend ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: enigma_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      NODE_ENV:        production
      DATABASE_URL:    postgresql://enigma:${POSTGRES_PASSWORD:-changeme}@db:5432/enigma_db
      PORT:            3000
      CORS_ORIGINS:    http://localhost,http://localhost:80
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - enigma_net
    # Expose only internally – nginx proxies externally
    expose:
      - "3000"

  # ── Frontend – builds React/Vite app + proxies API/WS via nginx ──────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: enigma_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - enigma_net

volumes:
  postgres_data:

networks:
  enigma_net:
    driver: bridge
