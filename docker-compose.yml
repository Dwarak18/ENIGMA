# ══════════════════════════════════════════════════════════════════════════════
#  ENIGMA – Docker Compose
#
#  Services:
#    db        – PostgreSQL 15
#    backend   – Node.js API + WebSocket
#    frontend  – Builds Vite/React app, serves via nginx, proxies API & WS
#    firmware  – ESP-IDF builder + flasher  (profile: firmware, run on demand)
#
#  Usage:
#    docker compose up -d --build              ← start backend/frontend/db
#    docker compose --profile firmware run --rm firmware            ← build only
#    docker compose --profile firmware run --rm -e FLASH=1 -e MONITOR=1 firmware  ← build+flash+monitor
#
#  Windows USB passthrough (required for flash):
#    winget install usbipd
#    usbipd list                               ← find ESP32 COM bus ID
#    usbipd bind   --busid <BUSID>
#    usbipd attach --wsl --busid <BUSID>       ← exposes as /dev/ttyACM0
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: enigma_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     enigma
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB:       enigma_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enigma -d enigma_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - enigma_net

  # ── Backend ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: enigma_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      NODE_ENV:              production
      DATABASE_URL:          postgresql://enigma:${POSTGRES_PASSWORD:-changeme}@db:5432/enigma_db
      PORT:                  3000
      CORS_ORIGINS:          http://localhost,http://localhost:80
      MAX_TIMESTAMP_SKEW_S:  300
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - enigma_net
    expose:
      - "3000"

  # ── Frontend – builds React/Vite app + proxies API/WS via nginx ──────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: enigma_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - enigma_net

  # ── Firmware Simulator – always-on, runs alongside backend ────────────────
  #
  #  Uses the official espressif/idf image.  SIMULATE=1 skips the ESP-IDF
  #  build and runs simulate.py instead, which reproduces the ESP32 firmware
  #  behaviour in software:
  #    • generates 64 bytes of OS entropy every ENTROPY_INTERVAL_MS
  #    • hashes with SHA-256(entropy || timestamp_LE)
  #    • signs with ECDSA P-256
  #    • POSTs signed payload to POST /api/v1/entropy
  # ──────────────────────────────────────────────────────────────────────────
  firmware_sim:
    build:
      context: ./firmware
      dockerfile: Dockerfile
    container_name: enigma_firmware_sim
    restart: unless-stopped
    environment:
      SIMULATE:            "1"
      BACKEND_URL:         http://backend:3000
      DEVICE_ID:           ${DEVICE_ID:-esp32-001-sim}
      ENTROPY_BYTES:       64
      ENTROPY_INTERVAL_MS: ${ENTROPY_INTERVAL_MS:-10000}
      HTTP_TIMEOUT_S:      10
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - enigma_net

  # ── Firmware – ESP-IDF builder + flasher (run on demand, not always-on) ──
  #
  #  Build only:      docker compose --profile firmware run --rm firmware
  #  Build + flash:   docker compose --profile firmware run --rm \
  #                     -e FLASH=1 -e MONITOR=1 firmware
  #
  #  Serial port (/dev/ttyACM0) is the ESP32 after usbipd attach on Windows.
  #  Change PORT env var if your device appears at a different path.
  # ──────────────────────────────────────────────────────────────────────────
  firmware:
    build:
      context: ./firmware
      dockerfile: Dockerfile
    container_name: enigma_firmware
    profiles:
      - firmware
    volumes:
      # Mount the firmware source so changes are picked up immediately
      - ./firmware:/firmware
      # Persist the IDF component manager cache across runs
      - idf_components:/root/.espressif
    environment:
      IDF_TARGET:  esp32s3
      PORT:        ${ESP_PORT:-/dev/ttyACM0}
      BAUD:        ${ESP_BAUD:-460800}
      FLASH:       ${FLASH:-0}
      MONITOR:     ${MONITOR:-0}
    # Pass the serial device into the container (needed for flash/monitor).
    # Comment this block out if you are doing build-only (no device attached).
    devices:
      - ${ESP_PORT:-/dev/ttyACM0}:${ESP_PORT:-/dev/ttyACM0}
    privileged: true        # required for serial port access
    networks:
      - enigma_net

volumes:
  postgres_data:
  idf_components:     # caches the ~2 GB ESP-IDF component tree between runs

networks:
  enigma_net:
    driver: bridge
